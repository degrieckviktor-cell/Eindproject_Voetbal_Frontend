<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Football<span>Intel</span></div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="matches.html" class="active">Matches</a>
    <a href="Standings.html">Standings</a>
    <a href="Teams.html">Teams</a>
  </div>

  <a href="about_us.html" class="cta">About Us</a>
</nav>

<!-- HERO / HEADER -->
<section class="hero">
  <h1>Match <span>History</span></h1>
</section>

<!-- CONTENT -->
<main class="container">

  <div id="matches-list"></div>

</main>

<!-- SCRIPT -->
<script>
  const matches = [
    { team1: "Team A", team2: "Team B", score: "2 - 1", date: "2026-04-01" },
    { team1: "Team C", team2: "Team D", score: "0 - 0", date: "2026-03-30" },
    { team1: "Team E", team2: "Team F", score: "3 - 2", date: "2026-03-28" }
  ];

  const container = document.getElementById("matches-list");

  function renderMatches() {
    container.innerHTML = "";

    matches.forEach(match => {
      const div = document.createElement("div");
      div.classList.add("match");

      div.innerHTML = `
        <div class="teams">${match.team1} vs ${match.team2}</div>
        <div class="score">Score: ${match.score}</div>
        <div class="date">Datum: ${match.date}</div>
      `;

      container.appendChild(div);
    });
  }

  renderMatches();
</script>

</body>
</html>
