<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches | FootballIntel</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link id="theme-stylesheet" rel="stylesheet" href="Style.css">

  <style>
    #theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 9999;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      transition: transform 0.2s ease;
    }
    #theme-toggle:hover {
      transform: scale(1.2);
    }

    body {
      background-color: #120a05;
      color: #FAF0E8;
      font-family: 'Inter', sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .match {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(216, 90, 48, 0.2);
      border-left: 5px solid #D85A30;
      margin-bottom: 16px;
      padding: 20px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .match:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .match-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .match-teams {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
    }

    .match-score {
      font-size: 1rem;
      color: #D85A30;
      font-weight: 500;
    }

    .match-date {
      font-size: 0.85rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .match-actions {
      display: flex;
      gap: 12px;
    }

    .match-actions button {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(216, 90, 48, 0.1);
      border: 1px solid rgba(216, 90, 48, 0.3);
      color: #FAF0E8;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 18px;
    }

    .match-actions button:hover {
      background: #D85A30;
      color: #1A1008;
      box-shadow: 0 0 15px rgba(216, 90, 48, 0.4);
    }

    .match-actions button.btn-delete:hover {
      background: #EF9F27;
      border-color: #EF9F27;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #1c110a;
      padding: 40px;
      border-radius: 16px;
      border: 1px solid #D85A30;
      width: 100%;
      max-width: 400px;
      color: white;
    }

    .modal-content h2 { margin-top: 0; color: #D85A30; }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #2a1a11;
      border: 1px solid #444;
      color: white;
      border-radius: 6px;
    }

    .btn-save {
      background: #D85A30;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-cancel {
      background: transparent;
      color: #999;
      border: none;
      cursor: pointer;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <div class="logo">Football<span>Intel</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="matches.html" class="active">Matches</a>
    <a href="Standings.html">Standings</a>
    <a href="Teams.html">Teams</a>
  </div>
  <div class="nav-cta-group">
    <a href="admin.html" class="cta">Admin</a>
    <a href="about_us.html" class="cta">About Us</a>
  </div>
</nav>

<section class="hero">
  <h1>Match <span>History</span></h1>
</section>

<main class="container">
  <div id="matches-list"></div>

  <div style="margin-top: 30px; text-align: center;">
    <button class="btn-primary" onclick="addMatch()">+ Nieuwe Match Toevoegen</button>
  </div>
</main>

<!-- Popup: match toevoegen -->
<div id="match-popup" class="modal-overlay">
  <div class="modal-content">
    <h2>Match toevoegen</h2>
    <label>Datum</label>
    <input type="date" id="popup-date">
    <label>Thuis Team</label>
    <select id="popup-home"></select>
    <label>Uit Team</label>
    <select id="popup-away"></select>
    <label>Score Thuis</label>
    <input type="number" id="popup-home-score" value="0">
    <label>Score Uit</label>
    <input type="number" id="popup-away-score" value="0">
    <div style="margin-top: 20px;">
      <button class="btn-save" onclick="submitMatch()">Toevoegen</button>
      <button class="btn-cancel" onclick="closePopup()">Annuleren</button>
    </div>
  </div>
</div>

<!-- Popup: match bewerken -->
<div id="edit-popup" class="modal-overlay">
  <div class="modal-content">
    <h2>Match bewerken</h2>
    <label>Datum</label>
    <input type="date" id="edit-date">
    <label>Score Thuis</label>
    <input type="number" id="edit-home-score">
    <label>Score Uit</label>
    <input type="number" id="edit-away-score">
    <div style="margin-top: 20px;">
      <button class="btn-save" onclick="saveEdit()">Opslaan</button>
      <button class="btn-cancel" onclick="closeEdit()">Annuleren</button>
    </div>
  </div>
</div>

<button id="theme-toggle" title="Toggle dark mode">☀️</button>

<script src="matches.js"></script>
<script src="script.js"></script>

</body>
</html>
