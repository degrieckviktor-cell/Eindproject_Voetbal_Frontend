<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Football<span>Intel</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="matches.html" class="active">Matches</a>
    <a href="Standings.html">Standings</a>
    <a href="Teams.html">Teams</a>
  </div>

  <a href="about_us.html" class="cta">About Us</a>
</nav>

<!-- HERO / HEADER -->
<section class="hero">
  <h1>Match <span>History</span></h1>
</section>

<!-- CONTENT -->
<main class="container">
  <div id="matches-list"></div>

  <div style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="addMatch()">+ Match toevoegen</button>
  </div>

  <div style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="deleteMatch()">- Match verwijderen</button>
  </div>
</main>

<!-- POPUP voor match toevoegen -->
<div id="match-popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; justify-content:center; align-items:center;">
  <div style="background:#1a1a2e; padding:40px; border-radius:12px; width:400px; color:white;">
    <h2 style="margin-bottom:20px;">Match toevoegen</h2>

    <label>Datum</label>
    <input type="date" id="popup-date" style="width:100%; padding:8px; margin-bottom:15px; border-radius:6px; border:none;"><br>

    <label>Thuisteam</label>
    <select id="popup-home" style="width:100%; padding:8px; margin-bottom:15px; border-radius:6px; border:none;"></select>

    <label>Uitteam</label>
    <select id="popup-away" style="width:100%; padding:8px; margin-bottom:15px; border-radius:6px; border:none;"></select>

    <label>Score thuisteam</label>
    <input type="number" id="popup-home-score" value="0" min="0" style="width:100%; padding:8px; margin-bottom:15px; border-radius:6px; border:none;">

    <label>Score uitteam</label>
    <input type="number" id="popup-away-score" value="0" min="0" style="width:100%; padding:8px; margin-bottom:30px; border-radius:6px; border:none;">

    <div style="display:flex; gap:10px;">
      <button class="btn-primary" onclick="submitMatch()">Toevoegen</button>
      <button class="btn-primary" onclick="closePopup()" style="background:#555;">Annuleren</button>
    </div>
  </div>
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("matches-list");

    Promise.all([
      fetch("http://localhost:5153/api/match").then(r => r.json()),
      fetch("http://localhost:5153/api/Team").then(r => r.json())
    ])
    .then(([matches, teams]) => {
      const teamMap = {};
      teams.forEach(team => {
        teamMap[team.teamId] = team.name;
      });

      matches.forEach(match => {
        const div = document.createElement("div");
        div.classList.add("match");
        div.innerHTML = `
          <div class="teams">${teamMap[match.homeTeamId] ?? "Team " + match.homeTeamId} vs ${teamMap[match.awayTeamId] ?? "Team " + match.awayTeamId}</div>
          <div class="score">Score: ${match.homeScore} - ${match.awayScore}</div>
          <div class="date">Datum: ${match.matchDate}</div>
        `;
        container.appendChild(div);
      });
    })
    .catch(error => {
      console.error("Fout bij ophalen data:", error);
      container.innerHTML = "<p>Kon data niet laden.</p>";
    });
  });
</script>

</body>
</html>
