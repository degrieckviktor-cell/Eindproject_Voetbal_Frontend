<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches</title>
  <link id="theme-stylesheet" rel="stylesheet" href="Style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    #theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 9999;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      transition: transform 0.2s ease;
    }
    #theme-toggle:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Football<span>Intel</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="matches.html" class="active">Matches</a>
    <a href="Standings.html">Standings</a>
    <a href="Teams.html">Teams</a>
  </div>
  <a href="about_us.html" class="cta">About Us</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Match <span>History</span></h1>
</section>

<!-- CONTENT -->
<main class="container">
  <div id="matches-list"></div>
  <div style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="addMatch()">+ Match toevoegen</button>
  </div>
  <div style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="deleteMatch()">- Match verwijderen</button>
  </div>
</main>

<!-- DARK MODE TOGGLE -->
<button id="theme-toggle" title="Toggle dark mode">☀️</button>

<script src="script.js"></script>

<script>
  // --- Dark mode toggle ---
  const lightCSS = 'light-mode.css';
  const darkCSS  = 'dark-mode.css';
  const link   = document.getElementById('theme-stylesheet');
  const button = document.getElementById('theme-toggle');

  button.addEventListener('click', () => {
    const isDark = link.getAttribute('href') === darkCSS;
    link.setAttribute('href', isDark ? lightCSS : darkCSS);
    button.textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  });

  if (localStorage.getItem('theme') === 'dark') {
    link.setAttribute('href', darkCSS);
    button.textContent = '🌙';
  }
</script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("matches-list");

    Promise.all([
      fetch("http://localhost:5153/api/match").then(r => r.json()),
      fetch("http://localhost:5153/api/Team").then(r => r.json())
    ])
    .then(([matches, teams]) => {
      const teamMap = {};
      teams.forEach(team => {
        teamMap[team.teamId] = team.name;
      });

      matches.forEach(match => {
        const div = document.createElement("div");
        div.classList.add("match");
        div.innerHTML = `
          <div class="teams">${teamMap[match.homeTeamId] ?? "Team " + match.homeTeamId} vs ${teamMap[match.awayTeamId] ?? "Team " + match.awayTeamId}</div>
          <div class="score">Score: ${match.homeScore} - ${match.awayScore}</div>
          <div class="date">Datum: ${match.matchDate}</div>
        `;
        container.appendChild(div);
      });
    })
    .catch(error => {
      console.error("Fout bij ophalen data:", error);
      container.innerHTML = "<p>Kon data niet laden.</p>";
    });
  });
</script>

</body>
</html>
