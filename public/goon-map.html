    <style>
        #theme-toggle {
            position: fixed;
            bottom: 20px;

            font-size: 1.8rem;
            cursor: pointer;
            z-index: 9999;

        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem 4rem;
        }

        .photo-card {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
            background: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .photo-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .photo-card .caption {
            padding: 0.75rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: #444;
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 10px;
            object-fit: contain;
        }

        #lightbox .lb-caption {
            color: white;
            margin-top: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            opacity: 0.8;
        }

        #lightbox-close {
            position: fixed;
            top: 20px;
            right: 28px;
            font-size: 2rem;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>

<script src="script.js"></script>

<script>
    /* LIGHTBOX */
    function openLightbox(card) {
        const img     = card.querySelector('img');
        const caption = card.querySelector('.caption');
        document.getElementById('lb-img').src         = img.src;
        document.getElementById('lb-img').alt         = img.alt;
        document.getElementById('lb-caption').textContent = caption.textContent;
        const lb = document.getElementById('lightbox');
        lb.style.display = 'flex';
    }

    function closeLightbox(e) {
        if (e.target === document.getElementById('lightbox')) {
            document.getElementById('lightbox').style.display = 'none';
        }
    }

    /* DARK MODE */
    const lightCSS = 'Style.css';
    const darkCSS  = 'Styledark.css';
    const link     = document.getElementById('theme-stylesheet');
    const button   = document.getElementById('theme-toggle');

    function toggleTheme() {
        const isDark = link.getAttribute('href') === darkCSS;
        link.setAttribute('href', isDark ? lightCSS : darkCSS);
        button.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    button.addEventListener('click', toggleTheme);

    if (localStorage.getItem('theme') === 'dark') {
        link.setAttribute('href', darkCSS);
        button.textContent = '🌙';
    }
</script>
