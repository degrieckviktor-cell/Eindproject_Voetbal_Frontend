<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams | FootballIntel</title>
  <link id="theme-stylesheet" rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    #theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 9999;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      transition: transform 0.2s ease;
    }
    #theme-toggle:hover { transform: scale(1.2); }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(216,90,48,0.2);
      border-left: 5px solid #D85A30;
      margin-bottom: 16px;
      padding: 20px;
      border-radius: 12px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .card strong {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      color: white;
    }
    .section-title {
      margin-top: 20px;
      margin-bottom: 10px;
      color: #D85A30;
      font-weight: 600;
    }
    .player, .match {
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      color: #FAF0E8;
    }
    .match.played   { border-left: 4px solid #D85A30; }
    .match.upcoming { border-left: 4px solid #EF9F27; }

    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .dropdown { position: relative; }

    .dropdown-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(216,90,48,0.12);
      border: 1px solid rgba(216,90,48,0.4);
      border-radius: 10px;
      color: #FAF0E8;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .dropdown-trigger:hover {
      background: rgba(216,90,48,0.22);
      box-shadow: 0 4px 16px rgba(216,90,48,0.25);
    }
    .dropdown-trigger .arrow {
      font-size: 0.65rem;
      transition: transform 0.25s ease;
      opacity: 0.7;
    }
    .dropdown.open .dropdown-trigger .arrow { transform: rotate(180deg); }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 200px;
      background: #1c110a;
      border: 1px solid rgba(216,90,48,0.3);
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(216,90,48,0.08);
      z-index: 500;
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .dropdown.open .dropdown-menu {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: none;
      border-radius: 8px;
      color: #FAF0E8;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .dropdown-item:hover {
      background: rgba(216,90,48,0.15);
      color: #fff;
    }
    .dropdown-item .item-icon {
      font-size: 1rem;
      width: 20px;
      text-align: center;
    }
    .dropdown-item.danger:hover {
      background: rgba(239,159,39,0.15);
      color: #EF9F27;
    }

    .dropdown-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 4px 0;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .popup.active { display: flex; }

    .popup-content {
      background: #1c110a;
      border: 1px solid #D85A30;
      border-radius: 16px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 320px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      animation: popupIn 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes popupIn {
      from { transform: scale(0.93) translateY(16px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .popup-content h2 {
      font-family: 'Space Grotesk', sans-serif;
      color: #D85A30;
      margin: 0 0 4px;
      font-size: 1.3rem;
    }

    .popup-content input,
    .popup-content select {
      padding: 11px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #FAF0E8;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .popup-content input:focus,
    .popup-content select:focus {
      border-color: #D85A30;
      box-shadow: 0 0 0 3px rgba(216,90,48,0.15);
    }
    .popup-content select option { background: #1c110a; }

    .popup-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .btn-save {
      flex: 1;
      padding: 11px;
      background: linear-gradient(135deg, #D85A30, #EF9F27);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-save:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-cancel {
      padding: 11px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #999;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.09); color: #fff; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Football<span>Intel</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="matches.html">Matches</a>
    <a href="Standings.html">Standings</a>
    <a href="Teams.html" class="active">Teams</a>
  </div>
  <div class="nav-cta-group">
    <a href onclick="logoutAdmin()" class="logout-icon" title="Uitloggen">🚪</a>
    <a href="admin.html" class="cta">Admin</a>
    <a href="about_us.html" class="cta">About Us</a>
  </div>
</nav>

<section class="hero">
  <h1>All <span>Teams</span></h1>
  <p>Klik op een team om spelers en wedstrijden te bekijken.</p>
</section>

<main class="container">

  <!-- Verborgen voor niet-admins, wordt zichtbaar via teams.js als isAdmin() true is -->
  <div class="action-bar" id="admin-action-bar" style="display: none;">
    <div class="dropdown" id="dd-teams">
      <button class="dropdown-trigger" onclick="toggleDropdown('dd-teams')">
        🏟️ Teams
        <span class="arrow">▼</span>
      </button>
      <div class="dropdown-menu">
        <button class="dropdown-item" onclick="openAddTeamPopup(); closeAllDropdowns()">
          <span class="item-icon">➕</span> Team toevoegen
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item danger" onclick="openDeleteTeamPopup(); closeAllDropdowns()">
          <span class="item-icon">🗑️</span> Team verwijderen
        </button>
      </div>
    </div>

    <div class="dropdown" id="dd-players">
      <button class="dropdown-trigger" onclick="toggleDropdown('dd-players')">
        👤 Spelers
        <span class="arrow">▼</span>
      </button>
      <div class="dropdown-menu">
        <button class="dropdown-item" onclick="openAddPlayerPopup(); closeAllDropdowns()">
          <span class="item-icon">➕</span> Speler toevoegen
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item danger" onclick="openDeletePlayerPopup(); closeAllDropdowns()">
          <span class="item-icon">🗑️</span> Speler verwijderen
        </button>
      </div>
    </div>
  </div>

  <div id="teams-list"></div>

</main>

<!-- ADD TEAM -->
<div id="team-popup" class="popup">
  <div class="popup-content">
    <h2>➕ Team toevoegen</h2>
    <input type="text" id="team-name" placeholder="Team naam">
    <select id="team-division">
      <option value="">Kies divisie</option>
    </select>
    <div class="popup-actions">
      <button class="btn-save" onclick="submitTeam()">Toevoegen</button>
      <button class="btn-cancel" onclick="closePopups()">Annuleren</button>
    </div>
  </div>
</div>

<!-- DELETE TEAM -->
<div id="delete-team-popup" class="popup">
  <div class="popup-content">
    <h2>🗑️ Team verwijderen</h2>
    <select id="delete-team-select"></select>
    <div class="popup-actions">
      <button class="btn-save" onclick="submitDeleteTeam()">Verwijderen</button>
      <button class="btn-cancel" onclick="closePopups()">Annuleren</button>
    </div>
  </div>
</div>

<!-- ADD PLAYER -->
<div id="player-popup" class="popup">
  <div class="popup-content">
    <h2>➕ Speler toevoegen</h2>
    <input type="text" id="player-name" placeholder="Speler naam">
    <input type="number" id="player-age" placeholder="Leeftijd">
    <select id="player-team"></select>
    <div class="popup-actions">
      <button class="btn-save" onclick="submitPlayer()">Toevoegen</button>
      <button class="btn-cancel" onclick="closePopups()">Annuleren</button>
    </div>
  </div>
</div>

<!-- DELETE PLAYER -->
<div id="delete-player-popup" class="popup">
  <div class="popup-content">
    <h2>🗑️ Speler verwijderen</h2>
    <select id="delete-player-select"></select>
    <div class="popup-actions">
      <button class="btn-save" onclick="submitDeletePlayer()">Verwijderen</button>
      <button class="btn-cancel" onclick="closePopups()">Annuleren</button>
    </div>
  </div>
</div>

<button id="theme-toggle" title="Toggle dark mode">☀️</button>

<script src="teams.js"></script>
<script src="script.js"></script>

</body>
</html>
