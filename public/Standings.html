<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Football<span>Intel</span></div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="matches.html">Matches</a>
    <a href="Standings.html" class="active">Standings</a>
    <a href="Teams.html">Teams</a>
  </div>

  <a href="about_us.html" class="cta">About Us</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>League <span>Standings</span></h1>
  <p>Analyseer de ranglijst van teams in een warm, futuristisch dashboard.</p>
</section>

<!-- CONTENT -->
<main class="container">

  <table class="table">
    <thead>
      <tr>
        <th>#</th>
        <th>Team</th>
        <th>GS</th>
        <th>W</th>
        <th>G</th>
        <th>V</th>
        <th>DV</th>
        <th>DT</th>
        <th>P</th>
      </tr>
    </thead>

    <tbody id="standings-body"></tbody>
  </table>

</main>

<script>
  let standings = [
    { team: "Team A", played: 10, wins: 7, draws: 2, losses: 1, goalsFor: 20, goalsAgainst: 10, points: 23 },
    { team: "Team B", played: 10, wins: 6, draws: 1, losses: 3, goalsFor: 18, goalsAgainst: 12, points: 19 },
    { team: "Team C", played: 10, wins: 5, draws: 3, losses: 2, goalsFor: 15, goalsAgainst: 11, points: 18 },
    { team: "Team D", played: 10, wins: 3, draws: 2, losses: 5, goalsFor: 10, goalsAgainst: 15, points: 11 },
    { team: "Team E", played: 10, wins: 2, draws: 1, losses: 7, goalsFor: 8, goalsAgainst: 20, points: 7 }
  ];

  const tbody = document.getElementById("standings-body");

  function renderStandings() {
    tbody.innerHTML = "";

    standings.sort((a, b) => b.points - a.points);

    standings.forEach((team, index) => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${index + 1}</td>
        <td class="team">${team.team}</td>
        <td>${team.played}</td>
        <td>${team.wins}</td>
        <td>${team.draws}</td>
        <td>${team.losses}</td>
        <td>${team.goalsFor}</td>
        <td>${team.goalsAgainst}</td>
        <td>${team.points}</td>
      `;

      tbody.appendChild(tr);
    });
  }

  renderStandings();
</script>

</body>
</html>
