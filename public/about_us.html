<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <title>About Us</title>
  <style>
    body {

      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;

    .back-button {
      display: inline-block;

      padding: 10px 15px;
      background-color: #333;

    }

    .team-member {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .team-member img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      margin-right: 20px;
    }

    .team-member div {
      flex: 1;
    }

    .team-member h2 {

    }
