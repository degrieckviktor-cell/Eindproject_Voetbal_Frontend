<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Voetbal Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>⚽ Dashboard</h1>

    <div class="container">
        <div class="card">
            <h2>Matches</h2>
            <div class="weer" id="matches"></div>
        </div>

        <div class="card">
            <h2>Divisions</h2>
            <div class="weer" id="divisions"></div>
        </div>

        <div class="card">
            <h2>Players</h2>
            <div class="weer" id="players"></div>
        </div>

        <div class="card">
            <h2>Regions</h2>
            <div class="weer" id="regions"></div>
        </div>

        <div class="card">
            <h2>Teams</h2>
            <div class="weer" id="teams"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
